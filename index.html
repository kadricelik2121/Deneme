<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almanca Öğrenme</title>
  <style>
    :root{
      --bg1:#0d43b9;
      --bg2:#1769dd;
      --bg3:#2cc6ee;
      --blue1:#4fd0ff;
      --blue2:#165dff;
      --gold1:#ffd85a;
      --panelBorder:rgba(255,255,255,.22);
      --text:#eef6ff;
      --shadow:0 18px 40px rgba(0,0,0,.22);
      --soft:0 10px 22px rgba(0,0,0,.16);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:"Segoe UI", Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,.15), transparent 14%),
        radial-gradient(circle at 85% 18%, rgba(255,255,255,.12), transparent 18%),
        radial-gradient(circle at 80% 75%, rgba(255,255,255,.10), transparent 16%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 40%, var(--bg3) 100%);
      overflow:hidden;
    }
    .page{
      max-width: 1420px;
      min-height:100vh;
      margin:0 auto;
      padding:10px 14px 12px;
      position:relative;
    }
    .hero{
      position:relative;
      border-radius:28px;
      padding:10px 18px 16px;
      background:linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.08));
      border:1px solid var(--panelBorder);
      backdrop-filter: blur(10px);
      box-shadow:var(--shadow);
      overflow:hidden;
      min-height:calc(100vh - 24px);
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
    }
    .hero::before{
      content:"";
      position:absolute;
      inset:auto 14% 22px 14%;
      height:120px;
      border-radius:50%;
      background:radial-gradient(ellipse at center, rgba(119,214,255,.45) 0%, rgba(64,127,255,.24) 45%, rgba(0,0,0,0) 75%);
      filter:blur(5px);
      z-index:0;
    }
    .flag{
      position:absolute;
      left:12px;
      top:10px;
      font-size:54px;
      filter:drop-shadow(0 8px 16px rgba(0,0,0,.22));
      z-index:2;
      user-select:none;
    }
    .bubble{
      position:absolute;
      right:16px;
      top:10px;
      font-size:56px;
      filter:drop-shadow(0 8px 16px rgba(0,0,0,.18));
      z-index:2;
      user-select:none;
    }
    .title-wrap{
      position:relative;
      z-index:2;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      margin-top:2px;
      margin-bottom:14px;
    }
    .title-ribbon{
      position:relative;
      background:linear-gradient(180deg, #375bff 0%, #213ec7 100%);
      border-radius:999px;
      padding:8px 132px 10px;
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,.35),
        inset 0 -8px 0 rgba(0,0,0,.18),
        var(--soft);
      transform:perspective(800px) rotateX(10deg);
      max-width:min(100%, 760px);
    }
    .title{
      margin:0;
      font-size:clamp(28px, 4vw, 56px);
      font-weight:1000;
      letter-spacing:-1px;
      color:var(--gold1);
      text-shadow:0 4px 0 rgba(99,62,0,.28), 0 8px 18px rgba(0,0,0,.24);
      text-align:center;
    }
    .subtitle{
      margin:0;
      font-size:clamp(14px, 1.4vw, 24px);
      font-weight:800;
      text-align:center;
      color:#f5fbff;
      text-shadow:0 2px 10px rgba(0,0,0,.20);
    }
    .grid{
      position:relative;
      z-index:2;
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:10px 14px;
      margin:8px auto 0;
      width:min(100%, 1180px);
    }
    .link-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:58px;
      padding:10px 14px;
      border-radius:16px;
      text-decoration:none;
      color:#fff;
      font-size:clamp(18px, 1.2vw, 26px);
      font-weight:900;
      letter-spacing:.2px;
      text-align:center;
      background:linear-gradient(180deg, var(--blue1), var(--blue2));
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,.34),
        inset 0 -7px 0 rgba(0,0,0,.18),
        0 10px 16px rgba(0,0,0,.16);
      border:1px solid rgba(255,255,255,.18);
      text-shadow:0 2px 8px rgba(0,0,0,.22);
      transition:transform .15s ease, filter .15s ease, box-shadow .15s ease;
      user-select:none;
      position:relative;
      overflow:hidden;
    }
    .link-btn::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, rgba(255,255,255,.18), rgba(255,255,255,0) 35%, rgba(255,255,255,.12));
      opacity:.85;
      pointer-events:none;
    }
    .link-btn:hover{
      transform:translateY(-2px);
      filter:brightness(1.04);
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,.34),
        inset 0 -7px 0 rgba(0,0,0,.18),
        0 16px 24px rgba(0,0,0,.19);
    }
    .link-btn:active{ transform:translateY(1px); }
    .footer-note{
      position:relative;
      z-index:2;
      margin-top:10px;
      text-align:center;
      font-size:12px;
      font-weight:700;
      color:#eff8ff;
      opacity:.92;
    }
    .decor-left,.decor-right{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      display:flex;
      align-items:center;
      gap:10px;
      font-size:42px;
      line-height:1;
      filter:drop-shadow(0 6px 10px rgba(0,0,0,.25));
      z-index:3;
      user-select:none;
      pointer-events:none;
    }
    .decor-left{ left:22px; }
    .decor-right{ right:22px; }
    /* SADECE tablet ve telefonda scroll açılır; PC görünümü aynı kalır */
    @media (max-width:1024px){
      body{
        overflow-y:auto;
        overflow-x:hidden;
      }
    }

    @media (max-width:1100px){ .grid{ grid-template-columns:repeat(3, 1fr);} }
    @media (max-width:820px){
      .hero{ min-height:auto; padding-bottom:72px; }
      .grid{ grid-template-columns:repeat(2, 1fr); }
      .flag,.bubble{ font-size:44px; }
      .title-ribbon{ padding-left:104px; padding-right:104px; }
      .decor-left,.decor-right{ font-size:34px; gap:7px; }
      .decor-left{ left:16px; }
      .decor-right{ right:16px; }
    }
    @media (max-width:520px){
      .page{ padding:12px; }
      .hero{ padding:16px 14px 80px; border-radius:22px; }
      .grid{ grid-template-columns:1fr; gap:12px; }
      .link-btn{ min-height:62px; font-size:22px; }
      .flag,.bubble{ display:none; }
      .title-ribbon{ padding:8px 78px 10px; }
      .decor-left,.decor-right{ font-size:25px; gap:4px; }
      .decor-left{ left:12px; }
      .decor-right{ right:12px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div class="flag">🇩🇪</div>
      <div class="bubble">💬</div>

      <div class="title-wrap">
        <div class="title-ribbon">
          <div class="decor-left">🎧📚</div>
          <h1 class="title">ALMANCA ÖĞRENME</h1>
          <div class="decor-right">✏️📘</div>
        </div>
        <p class="subtitle">Programlarını buradan aç</p>
      </div>

      <div class="grid" id="buttonGrid"></div>

      <div class="footer-note">Düğme adlarını ve linklerini dosyanın içindeki LINKS alanından istediğin zaman değiştirebilirsin.</div>

    </div>
  </div>

  <script>
    const LINKS = [
      { label: "BAĞLAÇLAR", href: "bağlaçlar son.html" },
      { label: "KELİME EZBERLEME", href: "kelime ezberleme son.html" },
      { label: "KELİME EŞLEŞTİRME", href: "kelime_oyun1000.html" },
      { label: "OKUDUĞUU ANLAMA", href: "Okuduğunu anlama.html" },
      { label: "ZIT ANLAM", href: "zit anlam son2.html" },
      { label: "BAĞLANTI 7", href: "kelime_oyun1000ciftyönlü" },
      { label: "BAĞLANTI 8", href: "#" },
      { label: "BAĞLANTI 9", href: "#" },
      { label: "BAĞLANTI 10", href: "#" },
      { label: "BAĞLANTI 11", href: "#" },
      { label: "BAĞLANTI 12", href: "#" },
      { label: "BAĞLANTI 13", href: "#" },
      { label: "BAĞLANTI 14", href: "#" },
      { label: "BAĞLANTI 15", href: "#" },
      { label: "Tagesschau.de", href: "https://www.tagesschau.de/" },
      { label: "ESY GERMANY A2", href: "https://www.youtube.com/watch?v=CnelHuE5nGQ&list=PLk1fjOl39-5201BUdhtOM_x23poNvLouT" },
      { label: "ESY GERMANY B1", href: "https://www.youtube.com/watch?v=cyRDSqopIyA&list=PLk1fjOl39-53yooogv6RaJAK29mx7nz1d" },
      { label: "ESY GERMANY B2", href: "https://www.youtube.com/watch?v=NPbYXYcYCuk&list=PLk1fjOl39-51lvdiuQYsLW-0aGIdNNknA" },
      { label: " ESY GERMANY C1/C2", href: "https://www.youtube.com/watch?v=8erR5aYGa-A&list=PLk1fjOl39-53pjPz2VLCeu5vjOUMKZ22O" }
    ];

    const grid = document.getElementById("buttonGrid");
    LINKS.forEach((item, index) => {
      const a = document.createElement("a");
      a.className = "link-btn";
      a.href = item.href || "#";
      a.textContent = item.label || `BAĞLANTI ${index + 1}`;

      const isExternal = /^https?:\/\//i.test(a.href);
      if (isExternal) {
        a.target = "_blank";
        a.rel = "noopener noreferrer";
      }
      grid.appendChild(a);
    });
  </script>
</body>
</html>
