<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <title>Polly MP3 + Eşzamanlı Metin (Senkron İyileştirilmiş)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { --bg:#0b1020; --card:#12172a; --muted:#aab1c8; --text:#eaf0ff; --active:#1e2b55; }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font:16px system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
    header{padding:16px 20px;background:linear-gradient(180deg,#101735,#0b1020)}
    h1{margin:0;font-size:18px}
    .container{max-width:980px;margin:18px auto;padding:0 16px 40px}
    .panel{background:var(--card);border:1px solid #22305a;border-radius:16px;padding:14px}
    audio{width:100%;margin:8px 0 2px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;color:var(--muted);font-size:14px}
    .row input[type="number"]{width:90px;background:#0f1530;border:1px solid #293763;border-radius:8px;color:#cfe2ff;padding:6px}
    .btn{background:#141b34;color:var(--text);border:1px solid #22305a;border-radius:12px;padding:9px 12px;cursor:pointer}
    .btn:hover{background:#182043}
    h2{margin:0 0 10px;font-size:16px;color:#cfe2ff}
    ol#transcript{list-style:decimal;margin:0;padding:10px 0 10px 24px;max-height:72vh;overflow:auto;scroll-behavior:smooth}
    ol#transcript li{padding:12px 14px;margin:6px 0;border-radius:14px;line-height:1.55;font-size:18px;border:1px solid transparent;cursor:pointer}
    ol#transcript li:hover{background:#161d39}
    ol#transcript li.active{background:var(--active);border-color:#2c447f;box-shadow:inset 0 0 0 1px #2f4c97}
    .fake{display:none}
    .kbd{font-family:ui-monospace,Consolas,monospace;background:#0d1226;border:1px solid #26335e;border-radius:6px;padding:2px 6px;color:#cde}
 

  </style>
</head>
<body>
  <header><h1>Amazon Polly MP3 + Eşzamanlı Metin (Senkron İyileştirilmiş)</h1></header>

  <div class="container">
    <div class="panel">
      <!-- MP3 sabit (dosyayı aynı klasöre koy) -->
      <audio id="audio" controls preload="auto">
        <source src="speech_20250830233033430.mp3" type="audio/mpeg" />
      </audio>

      <div class="row" style="margin-top:8px">
        <span>Okuma hızı (kelime/sn):</span>
        <input id="wps" type="number" step="0.1" min="0.8" value="1.9">
        <span>Her cümleye ek durak (sn):</span>
        <input id="pad" type="number" step="0.1" min="0" value="0.6">
        <span>Senkron ofseti (sn):</span>
        <input id="offset" type="number" step="0.05" value="0">
        <button id="recalc" class="btn">🔁 Otomatik Zamanları Yenile</button>
        <button id="toggleMark" class="btn">⏱️ Zaman İşaretleme: Kapalı</button>
        <button id="markNow" class="btn" title="Ctrl+Space">📍 Şu Anı İşaretle</button>
        <span class="row" style="gap:4px;color:#aab1c8">Kısayol: <span class="kbd">Ctrl</span> + <span class="kbd">Space</span></span>
      </div>
    </div>

    <div class="panel" style="margin-top:14px">
      <h2>Metin</h2>
      <ol id="transcript"></ol>
    </div>
  </div>

  <script>
  // --- Metin (son Almanca hali) ---
  const sentences = [
    "Hallo zusammen. Heute spreche ich über das deutsche Unternehmen VAUDE und das Thema Nachhaltigkeit. <span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
    "Ich habe dieses Unternehmen gewählt, weil VAUDE als besonders nachhaltig bekannt ist.",
    
    "Wer ist VAUDE?.<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
    "VAUDE ist ein deutsches Outdoor-Unternehmen aus Tettnang.", 
    "Die Firma wurde 1974 von Albrecht von Dewitz gegründet.<span class='fake'> .........., ........., ........, ........., ........,  ...</span>",
    "VAUDE produziert Outdoor-Produkte wie Kleidung, Rucksäcke, Zelte und Fahrradtaschen.<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
    "Das Unternehmen ist besonders für Nachhaltigkeit und Umweltfreundlichkeit bekannt.<span class='fake'>........, ........., ........,  ...</span>",
    
    "VAUDE produziert viele verschiedene Outdoor-Produkte.",
    "Dazu gehören Kleidung, Rucksäcke, Zelte, Wanderschuhe und Campingausrüstung.<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
      "Viele Produkte bestehen aus recycelten Materialien.<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
    
      "Ökologische Nachhaltigkeit<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
      "VAUDE nutzt recycelte Materialien wie PET-Flaschen. Die Flaschen werden recycelt und zu neuen Stoffen verarbeitet.<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
      "Dadurch entsteht weniger Plastikmüll.<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
      "VAUDE bietet auch Reparaturservices an.<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
      "Kaputte Produkte werden repariert statt weggeworfen. So können Produkte länger genutzt werden.<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
      "Das Unternehmen versucht, umweltfreundlich zu produzieren und nutzt klimafreundliche Energien.<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
      
    "Soziale Nachhaltigkeit<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
      "VAUDE achtet auf gute Zusammenarbeit im Team. Das Unternehmen unterstützt Vielfalt und Chancengleichheit.<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
    "Auch Work-Life-Balance ist für VAUDE wichtig. Die Mitarbeitenden sollen sich wohlfühlen.<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
   
    "Ökonomische Nachhaltigkeit<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
    "VAUDE produziert langlebige Produkte.Produkte sollen repariert und nicht sofort ersetzt werden.<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
    "Das Unternehmen setzt auf Qualität statt Massenproduktion. VAUDE denkt nicht nur an heute, sondern auch an die Zukunft.<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
    
    "Für diese Leistungen wurde VAUDE mit nationalen und internationalen Auszeichnungen geehrt.<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
    "Zusammenfassend kann man sagen, dass VAUDE viele nachhaltige Maßnahmen nutzt.<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
    "Das Unternehmen achtet auf Umwelt, Menschen und langfristiges Denken.<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
    "Deshalb ist VAUDE für mich ein gutes Beispiel für ein nachhaltiges Unternehmen.Vielen Dank für Ihre Aufmerksamkeit.<span class='fake'>............, .........., ........., ........, ........., ........,  ...</span>",
    

  ];


  // --- DOM ---
  const audio = document.getElementById('audio');
  const transcriptEl = document.getElementById('transcript');
  const wpsInput = document.getElementById('wps');
  const padInput = document.getElementById('pad');
  const offsetInput = document.getElementById('offset');
  const recalcBtn = document.getElementById('recalc');
  const toggleMarkBtn = document.getElementById('toggleMark');
  const markNowBtn = document.getElementById('markNow');

  // --- Metni çiz ---
  sentences.forEach((s, i) => {
    const li = document.createElement('li');
   li.innerHTML = s;
    li.dataset.index = i;
    li.addEventListener('click', () => { audio.currentTime = (timings[i]||0); audio.play(); });
    transcriptEl.appendChild(li);
  });

  // --- Otomatik tahmini zamanlar ---
  function wordsOf(s){ return (s.match(/[^\s–—-]+/g) || []).length; }
  function buildAutoTimings(wps=1.9, pad=0.6){
    const t=[]; let acc=0;
    for(const s of sentences){ t.push(+acc.toFixed(2)); acc += wordsOf(s)/wps + pad; }
    return t;
  }
  let timings = buildAutoTimings();

  // --- Hassas senkron: rAF + histerezis ---
  let lastActive=-1, rafId=null;
  function midpoint(i){
    const a = timings[i]??0, b = timings[i+1]??(a+4);
    return a + (b-a)/2; // ortasını al
  }
  function chooseIndex(t){
    // global offset uygula
    t = t + parseFloat(offsetInput.value||0);
    // en uygun index: t, i ve i+1 orta noktası kıyas
    let i = 0;
    // binary search (timings artan)
    let lo=0, hi=timings.length-1;
    while(lo<=hi){
      const mid = (lo+hi)>>1;
      if (timings[mid] <= t) { i = mid; lo = mid+1; } else { hi = mid-1; }
    }
    // histerezis: bir sonraki cümleye, orta noktayı geçince geç
    if (i < timings.length-1 && t >= midpoint(i)) i++;
    return i;
  }
  function loop(){
    const t = audio.currentTime;
    const i = chooseIndex(t);
    if(i!==lastActive){
      // highlight değişimi
      transcriptEl.querySelector('.active')?.classList.remove('active');
      const li = transcriptEl.querySelector(`li[data-index="${i}"]`);
      if(li){ li.classList.add('active'); li.scrollIntoView({block:'center', behavior:'smooth'}); }
      lastActive=i;
    }
    rafId = requestAnimationFrame(loop);
  }
  audio.addEventListener('play', ()=> { cancelAnimationFrame(rafId); rafId = requestAnimationFrame(loop); });
  audio.addEventListener('pause', ()=> cancelAnimationFrame(rafId));
  audio.addEventListener('ended', ()=> cancelAnimationFrame(rafId));

  // --- Ayarları değiştir ---
  function recalc(){
    const wps = parseFloat(wpsInput.value)||1.9;
    const pad = parseFloat(padInput.value)||0.6;
    timings = buildAutoTimings(wps,pad);
  }
  recalcBtn.addEventListener('click', recalc);

  // --- İsteğe bağlı manuel işaretleme (sade, JSON yok) ---
  let markMode=false, markPtr=0;
  function setMarkMode(on){
    markMode = on; markPtr = 0;
    toggleMarkBtn.textContent = `⏱️ Zaman İşaretleme: ${on?'Açık':'Kapalı'}`;
    if(on){ timings = new Array(sentences.length).fill(0); }
  }
  toggleMarkBtn.addEventListener('click', ()=> setMarkMode(!markMode));
  function markNow(){
    if(!markMode || markPtr>=sentences.length) return;
    timings[markPtr] = +(audio.currentTime + parseFloat(offsetInput.value||0)).toFixed(2);
    markPtr++;
  }
  markNowBtn.addEventListener('click', markNow);
  window.addEventListener('keydown', (e)=>{
    if(e.ctrlKey && e.code==='Space'){ e.preventDefault(); markNow(); }
  });
  </script>
</body>
</html>
