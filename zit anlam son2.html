<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zıt Anlam Modu</title>
  <style>
    :root{
      --orange1:#ffb100;
      --orange2:#ff6200;
      --green1:#8be23f;
      --green2:#2eb248;
      --blue1:#44c7ff;
      --blue2:#1159ff;
      --purple1:#c86dff;
      --purple2:#6529ff;
      --red1:#ff7d8c;
      --red2:#d92b46;
      --text:#eef5ff;
      --shadow:0 14px 30px rgba(0,0,0,.18);
      --shadow-soft:0 8px 18px rgba(0,0,0,.14);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:"Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.16), transparent 18%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,.14), transparent 20%),
        radial-gradient(circle at 70% 80%, rgba(255,255,255,.10), transparent 15%),
        linear-gradient(180deg, #0d43b9 0%, #1769dd 35%, #2cc6ee 100%);
      color:var(--text);
      overflow:hidden;
    }

    .app-shell{height:100vh; padding:8px 12px; position:relative; overflow:hidden}
    .screen{display:none; max-width:1180px; margin:0 auto; min-height:calc(100vh - 16px)}
    .screen.active{display:block}

    .top-nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:4px;
      flex-wrap:wrap;
    }

    .mode-title{
      font-size:clamp(26px, 3vw, 44px);
      font-weight:900;
      text-align:center;
      margin:0 0 2px;
      color:#fff;
      text-shadow:0 4px 16px rgba(0,0,0,.18);
    }

    .mode-subtitle{
      text-align:center;
      font-size:clamp(16px, 1.8vw, 24px);
      font-weight:800;
      color:#eef6ff;
      text-shadow:0 2px 8px rgba(0,0,0,.2);
      margin-bottom:16px;
    }

    .glass-card{
      background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.08));
      border:1px solid rgba(255,255,255,.22);
      border-radius:24px;
      box-shadow:var(--shadow-soft);
      backdrop-filter: blur(10px);
    }

    .top-btn, .card-btn, .answer-btn, .word-item, .opposite-item{
      border:none;
      color:#fff;
      cursor:pointer;
      font-weight:900;
      text-shadow:0 2px 8px rgba(0,0,0,.24);
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,.35),
        inset 0 -6px 0 rgba(0,0,0,.18),
        0 12px 20px rgba(0,0,0,.12);
      transition:.16s transform, .16s filter;
    }
    .top-btn:hover, .card-btn:hover, .answer-btn:hover, .word-item:hover, .opposite-item:hover{transform:translateY(-2px)}

    .btn-orange{background:linear-gradient(180deg, var(--orange1), var(--orange2))}
    .btn-blue{background:linear-gradient(180deg, var(--blue1), var(--blue2))}
    .btn-green{background:linear-gradient(180deg, var(--green1), var(--green2))}
    .btn-purple{background:linear-gradient(180deg, var(--purple1), var(--purple2))}
    .btn-red{background:linear-gradient(180deg, var(--red1), var(--red2))}

    .top-btn{
      min-height:54px;
      min-width:150px;
      border-radius:999px;
      padding:10px 18px;
      font-size:22px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .menu-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:18px;
    }

    .menu-card{
      min-height:300px;
      border-radius:28px;
      padding:18px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:space-between;
      text-align:center;
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,.35),
        inset 0 -8px 0 rgba(0,0,0,.18),
        0 16px 24px rgba(0,0,0,.14);
    }

    .menu-card h3{margin:4px 0 0; font-size:clamp(24px, 2.3vw, 40px); font-weight:900; color:#fff}
    .card-emoji{font-size:84px; filter:drop-shadow(0 8px 14px rgba(0,0,0,.2)); margin:8px 0 4px}

    .card-btn{
      width:100%;
      min-height:68px;
      border-radius:999px;
      font-size:clamp(22px, 2vw, 32px);
      padding:12px 20px;
    }

    .stat-bar{
      width:fit-content;
      margin:0 auto 4px;
      padding:5px 10px;
      border-radius:12px;
      background:linear-gradient(180deg, #c58945, #8d5420);
      box-shadow:inset 0 2px 0 rgba(255,255,255,.22), inset 0 -3px 0 rgba(0,0,0,.14), var(--shadow-soft);
    }

    .stat-inner{
      background:linear-gradient(180deg, rgba(69,34,6,.45), rgba(45,22,4,.65));
      border-radius:10px;
      padding:5px 10px;
      min-height:30px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      font-weight:900;
      font-size:13px;
      color:#fff;
    }

    .question-card{
      padding:22px 18px;
      text-align:center;
      margin-bottom:18px;
    }

    .question-word{
      font-size:clamp(36px, 4vw, 58px);
      font-weight:900;
      color:#fff;
      text-shadow:0 4px 16px rgba(0,0,0,.2);
      margin-bottom:6px;
    }

    .question-label{
      font-size:clamp(16px, 1.8vw, 24px);
      font-weight:800;
      color:#eef6ff;
      text-shadow:0 2px 8px rgba(0,0,0,.2);
    }

    .answers-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px}

    .answer-btn{
      min-height:84px;
      border-radius:22px;
      font-size:clamp(24px, 2.4vw, 34px);
      padding:14px;
      background:linear-gradient(180deg, var(--orange1), var(--orange2));
    }
    .answer-btn.correct{background:linear-gradient(180deg, var(--green1), var(--green2)) !important}
    .answer-btn.wrong{background:linear-gradient(180deg, var(--red1), var(--red2)) !important}
    .answer-btn.disabled-wrong{opacity:.92}


    .tr-line{
      display:block;
      margin-top:6px;
      font-size:.72em;
      font-weight:800;
      opacity:.96;
      line-height:1.15;
      text-shadow:0 2px 6px rgba(0,0,0,.22);
    }

    .match-tr-line{
      display:block;
      margin-top:7px;
      font-size:.72em;
      font-weight:800;
      opacity:.96;
      line-height:1.12;
    }

    .matched-pair{
      flex-direction:column;
      gap:4px;
      line-height:1.15;
    }

    .matched-pair-de, .matched-pair-tr{
      display:block;
      width:100%;
    }

    .match-layout{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:-6px}
    .panel{padding:12px; min-height:320px}
    .panel-title{text-align:center; font-size:24px; font-weight:900; margin:0 0 8px; color:#fff}

    .word-item, .opposite-item{
      width:100%;
      min-height:68px;
      border-radius:18px;
      margin-bottom:8px;
      font-size:25px;
      padding:8px 14px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      user-select:none;
    }
    .word-item{background:linear-gradient(180deg, var(--orange1), var(--orange2))}
    .opposite-item{background:linear-gradient(180deg, var(--blue1), var(--blue2))}
    .word-item.selected{outline:4px solid rgba(255,255,255,.7); filter:brightness(1.06)}
    .opposite-item.correct{background:linear-gradient(180deg, var(--green1), var(--green2))}

    .result-box{
      margin-top:6px;
      text-align:center;
      font-size:20px;
      font-weight:900;
      min-height:26px;
      color:#fff7b0;
      text-shadow:0 2px 8px rgba(0,0,0,.2);
    }



    #matchScreen{
      transform:translateY(-10px);
    }

    @media (max-width: 980px){
      .menu-grid, .match-layout, .answers-grid{grid-template-columns:1fr}
      .top-nav{justify-content:center}
      .menu-card{min-height:250px}
    }

    @media (max-width: 640px){
      .app-shell{padding:10px}
      .top-btn{min-width:126px; font-size:19px; min-height:48px}
      .card-emoji{font-size:72px}
      .answer-btn{min-height:74px; font-size:22px}
      .word-item,.opposite-item{font-size:19px; min-height:50px}
      .panel-title{font-size:24px}
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <section id="menuScreen" class="screen active">
      <div class="top-nav">

        </div>

    </section>

    <section id="choiceScreen" class="screen">
      <div class="top-nav">
        <button class="top-btn btn-blue" id="choiceBackBtn">← Geri</button>
        <button class="top-btn btn-blue" id="choiceNextBtn">Next</button>

      <div class="stat-bar">
        <div class="stat-inner">

          <span>✅ <span id="choiceCorrectCount">0</span></span>
          <span>❌ <span id="choiceWrongCount">0</span></span>

      <div class="mode-title">Seçenekli Zıt Anlam Modu</div>

      <div class="glass-card question-card">

      <div class="answers-grid" id="choiceAnswers"></div>
      <div class="result-box" id="choiceResult"></div>
    </section>

    <section id="matchScreen" class="screen">
      <div class="top-nav">
        <button class="top-btn btn-blue" id="matchBackBtn">← Geri</button>
        <button class="top-btn btn-blue" id="matchNextBtn">Next</button>

        </div>
      </div>

      <div class="mode-title">Zıt Anlam Eşleştirme Modu</div>

      <div class="match-layout">
        <div class="glass-card panel">
          <div class="panel-title">Kelimeler</div>
          <div id="leftWords"></div>
        </div>

        <div class="glass-card panel">
          <div class="panel-title">Zıt Anlamlar</div>
          <div id="rightWords"></div>
        </div>
      </div>

      <div class="result-box" id="matchResult"></div>
    </section>
  </div>

    function shuffleArray(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function speakText(text, onEnd = null) {
      if (!("speechSynthesis" in window)) {
        if (onEnd) onEnd();
        return;
      }
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "de-DE";
      utterance.rate = 0.9;
      utterance.pitch = 1;
      utterance.onend = () => onEnd && onEnd();
      utterance.onerror = () => onEnd && onEnd();
      window.speechSynthesis.speak(utterance);
    }

    function speakSequence(parts, onEnd = null) {
      if (!("speechSynthesis" in window)) {
        if (onEnd) onEnd();
        return;
      }
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
      let index = 0;

      function speakNext() {
        if (index >= parts.length) {
          if (onEnd) onEnd();
          return;
        }
        const part = parts[index++];
        const utterance = new SpeechSynthesisUtterance(part.text);
        utterance.lang = part.lang || "de-DE";
        utterance.rate = part.rate || 0.9;
        utterance.pitch = 1;
        utterance.onend = speakNext;
        utterance.onerror = speakNext;
        window.speechSynthesis.speak(utterance);
      }

      speakNext();
    }

    function speakBilingualPair(item, onEnd = null) {
      speakSequence([
        { text: `${item.word} ... ${item.opposite}`, lang: "de-DE", rate: 0.9 },
        { text: `${item.trWord} ... ${item.trOpposite}`, lang: "tr-TR", rate: 0.72 }
      ], onEnd);
    }

    const screens = {
      menu: document.getElementById("menuScreen"),
      choice: document.getElementById("choiceScreen"),
      match: document.getElementById("matchScreen")
    };

    function showScreen(name) {
      Object.values(screens).forEach(s => s.classList.remove("active"));
      screens[name].classList.add("active");
      if ("speechSynthesis" in window) window.speechSynthesis.cancel();
    }

    document.getElementById("nextBtnTop").addEventListener("click", () => showScreen("menu"));

    /* ---------- SEÇENEKLİ MOD ---------- */
    const choiceQuestionWord = document.getElementById("choiceQuestionWord");
    const choiceAnswers = document.getElementById("choiceAnswers");
    const choiceResult = document.getElementById("choiceResult");
    const choiceRoundText = document.getElementById("choiceRoundText");
    const choiceCorrectCount = document.getElementById("choiceCorrectCount");
    const choiceWrongCount = document.getElementById("choiceWrongCount");

    let choiceCurrent = null;
    let choiceRound = 1;
    let choiceCorrect = 0;
    let choiceWrong = 0;
    let choiceLocked = false;
    let choiceAutoTimeout = null;

    function getChoiceOptions(correctItem) {
      const distractors = shuffleArray(oppositeData.filter(x => x.opposite !== correctItem.opposite)).slice(0, 3);
      return shuffleArray([correctItem, ...distractors]);
    }

    function renderChoiceQuestion() {
      clearTimeout(choiceAutoTimeout);
      choiceLocked = false;
      choiceResult.textContent = "";
      choiceCurrent = shuffleArray(oppositeData)[0];
      choiceQuestionWord.textContent = choiceCurrent.word;
      choiceRoundText.textContent = `${choiceRound} / 10`;
      choiceAnswers.innerHTML = "";

      const options = getChoiceOptions(choiceCurrent);
      options.forEach((item) => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.textContent = item.opposite;
        btn.addEventListener("click", () => handleChoiceAnswer(item, btn));
        choiceAnswers.appendChild(btn);
      });

      speakText(choiceCurrent.word);
    }

    function goNextChoiceQuestion() {
      choiceRound++;
      renderChoiceQuestion();
    }

    function handleChoiceAnswer(item, btn) {
      if (choiceLocked) return;
      const isCorrect = item.opposite === choiceCurrent.opposite;

      if (isCorrect) {
        choiceLocked = true;
        btn.classList.add("correct");
        choiceCorrect++;
        choiceCorrectCount.textContent = choiceCorrect;
        choiceResult.innerHTML = `Doğru: ${choiceCurrent.word} ↔ ${choiceCurrent.opposite}<span class="tr-line">${choiceCurrent.trWord} ↔ ${choiceCurrent.trOpposite}</span>`;

        const allBtns = choiceAnswers.querySelectorAll(".answer-btn");
        allBtns.forEach(b => b.disabled = true);

        speakBilingualPair(choiceCurrent, () => {
          choiceAutoTimeout = setTimeout(goNextChoiceQuestion, CHOICE_AUTO_NEXT_DELAY);
        });
      } else {
        btn.classList.add("wrong", "disabled-wrong");
        btn.disabled = true;
        choiceWrong++;
        choiceWrongCount.textContent = choiceWrong;
        choiceResult.textContent = "Yanlış, tekrar dene";
      }
    }

    document.getElementById("choiceModeBtn").addEventListener("click", () => {
      choiceRound = 1;
      choiceCorrect = 0;
      choiceWrong = 0;
      choiceCorrectCount.textContent = "0";
      choiceWrongCount.textContent = "0";
      showScreen("choice");
      renderChoiceQuestion();
    });

    document.getElementById("choiceBackBtn").addEventListener("click", () => showScreen("menu"));
    document.getElementById("choiceNextBtn").addEventListener("click", goNextChoiceQuestion);

    /* ---------- EŞLEŞTİRME MODU ---------- */
    const leftWords = document.getElementById("leftWords");
    const rightWords = document.getElementById("rightWords");
    const matchResult = document.getElementById("matchResult");
    const matchRoundText = document.getElementById("matchRoundText");
    const matchCorrectCount = document.getElementById("matchCorrectCount");
    const matchWrongCount = document.getElementById("matchWrongCount");

    let matchSet = [];
    let selectedLeft = null;
    let matchRound = 1;
    let matchCorrect = 0;
    let matchWrong = 0;
    let matchDoneCount = 0;
    let matchAutoTimeout = null;

    function renderMatchGame() {
      clearTimeout(matchAutoTimeout);
      matchSet = shuffleArray(oppositeData).slice(0, 5);
      selectedLeft = null;
      matchDoneCount = 0;
      matchResult.textContent = "";
      matchRoundText.textContent = `${matchRound} / 5`;
      leftWords.innerHTML = "";
      rightWords.innerHTML = "";

      matchSet.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "word-item";
        btn.textContent = item.word;
        btn.addEventListener("click", () => selectLeftWord(btn, item));
        leftWords.appendChild(btn);
      });

      shuffleArray(matchSet).forEach(item => {
        const btn = document.createElement("button");
        btn.className = "opposite-item";
        btn.textContent = item.opposite;
        btn.addEventListener("click", () => tryMatchOpposite(btn, item));
        rightWords.appendChild(btn);
      });
    }

    function goNextMatchSet() {
      matchRound++;
      renderMatchGame();
    }

    function selectLeftWord(btn, item) {
      const all = leftWords.querySelectorAll(".word-item");
      all.forEach(x => x.classList.remove("selected"));
      if (btn.disabled) return;
      btn.classList.add("selected");
      selectedLeft = { btn, item };
      speakText(item.word);
    }

    function tryMatchOpposite(btn, item) {
      if (!selectedLeft || btn.classList.contains("correct")) return;

      if (selectedLeft.item.word === item.word) {
        btn.classList.add("correct", "matched-pair");
        btn.innerHTML = `
          <span class="matched-pair-de">${selectedLeft.item.word} = ${item.opposite}</span>
          <span class="matched-pair-tr match-tr-line">${selectedLeft.item.trWord} = ${item.trOpposite}</span>
        `;
        selectedLeft.btn.disabled = true;
        selectedLeft.btn.style.opacity = "0.35";
        selectedLeft.btn.classList.remove("selected");
        selectedLeft = null;

        matchCorrect++;
        matchDoneCount++;
        matchCorrectCount.textContent = matchCorrect;
        matchResult.textContent = `Doğru eşleşme`;

        speakBilingualPair(item);

        if (matchDoneCount === 5) {
          matchResult.textContent = "Set tamamlandı";
          matchAutoTimeout = setTimeout(goNextMatchSet, MATCH_AUTO_NEXT_DELAY);
        }
      } else {
        matchWrong++;
        matchWrongCount.textContent = matchWrong;
        matchResult.textContent = "Yanlış eşleşme";
      }
    }

    document.getElementById("matchModeBtn").addEventListener("click", () => {
      matchRound = 1;
      matchCorrect = 0;
      matchWrong = 0;
      matchCorrectCount.textContent = "0";
      matchWrongCount.textContent = "0";
      showScreen("match");
      renderMatchGame();
    });

    document.getElementById("matchBackBtn").addEventListener("click", () => showScreen("menu"));
    document.getElementById("matchNextBtn").addEventListener("click", goNextMatchSet);
