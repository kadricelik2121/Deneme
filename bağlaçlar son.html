<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bağlaç Öğrenme Modu</title>
  <style>


#selectScreen{
  overflow-y:auto;
  padding-bottom:30px;
}




    :root{
      --bg1:#0d47c9; --bg2:#1db7e8; --text:#eef5ff; --shadow:0 18px 45px rgba(0,0,0,.22);
      --shadow-soft:0 10px 24px rgba(0,0,0,.16); --orange1:#ffb100; --orange2:#ff6200;
      --blue1:#44c7ff; --blue2:#1159ff; --green1:#8be23f; --green2:#2eb248;
      --purple1:#c86dff; --purple2:#6529ff; --red1:#ff7d8c; --red2:#d92b46;
      --wood1:#c58945; --wood2:#8d5420;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; font-family:"Segoe UI",Arial,sans-serif; color:var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.16), transparent 18%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,.14), transparent 20%),
        radial-gradient(circle at 70% 80%, rgba(255,255,255,.10), transparent 15%),
        linear-gradient(180deg, #0d43b9 0%, #1769dd 35%, #2cc6ee 100%);
      overflow-x:hidden;
    }
    .app{height:100vh; padding:10px; max-width:1280px; margin:0 auto; overflow:hidden;}
    .screen{display:none; height:calc(100vh - 20px); position:relative; overflow:hidden;}
    .screen.active{display:block}
    .topbar{display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:nowrap; margin-bottom:8px;}
    .left, .right{display:flex; gap:8px; align-items:center; flex-wrap:nowrap;}
    .btn, .nav-link, .pill, .choice-btn, .mode-btn{
      border:none; color:#fff; cursor:pointer; font-weight:900; text-shadow:0 2px 8px rgba(0,0,0,.24);
      box-shadow: inset 0 3px 0 rgba(255,255,255,.35), inset 0 -8px 0 rgba(0,0,0,.18), 0 16px 24px rgba(0,0,0,.14);
      transition:.16s transform,.16s filter;
    }
    .btn:hover, .nav-link:hover, .pill:hover, .choice-btn:hover, .mode-btn:hover{transform:translateY(-2px)}
    .btn, .nav-link{padding:10px 16px; border-radius:999px; min-height:48px; font-size:20px; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; white-space:nowrap;}
    .btn-blue{background:linear-gradient(180deg,var(--blue1),var(--blue2))}
    .btn-orange{background:linear-gradient(180deg,var(--orange1),var(--orange2))}
    .btn-green{background:linear-gradient(180deg,var(--green1),var(--green2))}
    .btn-purple{background:linear-gradient(180deg,var(--purple1),var(--purple2))}
    .btn-red{background:linear-gradient(180deg,var(--red1),var(--red2))}
    .title{font-size:clamp(28px,3.4vw,46px); font-weight:900; text-align:center; margin:4px 0 2px; text-shadow:0 4px 18px rgba(0,0,0,.18)}
    .subtitle{text-align:center; font-size:clamp(16px,1.5vw,22px); font-weight:800; color:#eef6ff; margin-bottom:10px; text-shadow:0 2px 10px rgba(0,0,0,.22)}
    .hero{padding:24px; border-radius:34px; background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.08)); border:1px solid rgba(255,255,255,.24); box-shadow:var(--shadow); backdrop-filter:blur(10px)}
    .menu-grid{display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-top:22px;}
    .mode-card{min-height:290px; border-radius:32px; padding:24px; display:flex; flex-direction:column; justify-content:space-between; align-items:center; text-align:center; box-shadow: inset 0 3px 0 rgba(255,255,255,.35), inset 0 -8px 0 rgba(0,0,0,.18), 0 18px 28px rgba(0,0,0,.16)}
    .mode-card .emoji{font-size:88px; filter:drop-shadow(0 10px 18px rgba(0,0,0,.2))}
    .mode-card h3{margin:0; font-size:clamp(28px,3vw,42px); text-shadow:0 3px 10px rgba(0,0,0,.26)}
    .mode-btn{width:100%; min-height:74px; border-radius:999px; font-size:28px}
    .panel{background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.10)); border:1px solid rgba(255,255,255,.22); border-radius:28px; box-shadow:var(--shadow-soft); backdrop-filter:blur(10px); padding:18px}
    .category{margin-bottom:16px}
    .category h3{margin:0 0 10px; font-size:28px; text-shadow:0 3px 10px rgba(0,0,0,.2)}
    .category small{display:block; margin-bottom:10px; color:#f4fbff; opacity:.9; font-size:16px}
    .checks{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px}
    .check-item{background:linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.08)); border-radius:18px; padding:10px 12px; display:flex; align-items:flex-start; gap:10px}
    .check-item input{width:22px; height:22px; margin-top:2px}
    .check-item label{font-size:18px; font-weight:700; line-height:1.25}
    .wood{width:fit-content; margin:0 auto 6px; padding:4px 8px; border-radius:14px; background:linear-gradient(180deg,var(--wood1),var(--wood2)); box-shadow:inset 0 2px 0 rgba(255,255,255,.22), inset 0 -3px 0 rgba(0,0,0,.14), var(--shadow-soft)}
    .wood-inner{background:linear-gradient(180deg, rgba(69,34,6,.45), rgba(45,22,4,.65)); border-radius:12px; padding:6px 10px; min-height:30px; display:flex; gap:8px; align-items:center; justify-content:center; flex-wrap:wrap; font-size:13px; font-weight:900}
    .settings{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px}
    .setting-box{background:linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.08)); border-radius:18px; padding:10px}
    .setting-box label{display:block; font-size:14px; font-weight:800; margin-bottom:6px}
    .setting-box select, .setting-box input{width:100%; min-height:40px; border:none; border-radius:12px; padding:6px 10px; font-size:16px; font-weight:700}
    .question-card{padding:14px; text-align:center; margin-bottom:10px}
    .question-text{font-size:clamp(24px,2.8vw,40px); font-weight:900; line-height:1.32; text-shadow:0 4px 16px rgba(0,0,0,.25)}
    .blank-slot{display:inline-block; min-width:150px; margin:0 6px; padding:0 4px 2px; border-bottom:4px solid rgba(255,255,255,.95); text-align:center; vertical-align:baseline}
    .filled-answer{display:inline-block; margin:0 6px; vertical-align:baseline; color:#fff;}
    .choice-grid{display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px}
    .choice-btn{min-height:74px; border-radius:20px; font-size:22px; padding:10px; background:linear-gradient(180deg,var(--orange1),var(--orange2))}
    .choice-btn.correct{background:linear-gradient(180deg,var(--green1),var(--green2))!important}
    .choice-btn.wrong{background:linear-gradient(180deg,var(--red1),var(--red2))!important}
    .controls{display:flex; justify-content:center; gap:10px; flex-wrap:nowrap; margin:8px 0 6px}
    .result{min-height:24px; text-align:center; font-size:18px; font-weight:900; color:#fff5aa; margin-top:6px}
    .layout{display:grid; grid-template-columns:1fr 1fr; gap:20px}
    .item-btn{width:100%; min-height:74px; border:none; border-radius:22px; margin-bottom:12px; color:#fff; font-size:26px; font-weight:900; cursor:pointer; box-shadow: inset 0 3px 0 rgba(255,255,255,.35), inset 0 -6px 0 rgba(0,0,0,.18), 0 12px 18px rgba(0,0,0,.13); text-shadow:0 2px 6px rgba(0,0,0,.15); padding:14px 18px}
    .left-item{background:linear-gradient(180deg,var(--orange1),var(--orange2))}
    .right-item{background:linear-gradient(180deg,var(--blue1),var(--blue2))}
    .item-btn.selected{outline:4px solid rgba(255,255,255,.7)}
    .item-btn.correct{background:linear-gradient(180deg,var(--green1),var(--green2))!important}
    .hint{font-size:18px; text-align:center; opacity:.95; margin-bottom:8px}
    .hidden{display:none!important}
    @media (max-width:980px){.menu-grid,.layout{grid-template-columns:1fr}.choice-grid{grid-template-columns:1fr 1fr}.topbar{justify-content:center;flex-wrap:wrap}.left,.right{flex-wrap:wrap}.settings{grid-template-columns:1fr 1fr}}
    @media (max-width:640px){body{overflow:auto}.app{height:auto;min-height:100%;padding:12px}.screen{height:auto;min-height:calc(100vh - 24px)}.btn,.nav-link{font-size:16px; min-height:42px; padding:8px 12px}.choice-grid{grid-template-columns:1fr 1fr}.choice-btn{font-size:18px; min-height:64px}.question-text{font-size:22px}.settings{grid-template-columns:1fr}.topbar,.left,.right{flex-wrap:wrap;justify-content:center}}
  </style>
</head>

        </div>
      </div>

      </div>
      <div class="title">Bağlaç Seçimi</div>

      <div class="panel">
        <div id="selectionCategories"></div>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <div class="topbar">
        <div class="left">
          <a href="index.html" class="nav-link btn-blue">🏠 Ana Sayfa</a>

          <button id="backToGameHomeBtn" class="btn btn-orange">Geri</button>
        </div>
        <div class="right">
          <button id="nextBtn" class="btn btn-blue">Next</button>
        </div>
      </div>

      <div class="wood"><div class="wood-inner">
        <span id="selectedCountText">Seçilen: 0</span>
        <span>Hak: <span id="lifeText">5</span></span>
        <span>✅ <span id="correctText">0</span></span>
        <span>❌ <span id="wrongText">0</span></span>
      </div></div>

      <div class="title">Bağlaç Seçme Oyunu</div>
      <div class="subtitle">Boşluğa uygun bağlacı seç</div>

      
      <div class="settings panel">
        <div class="setting-box">
          <label for="autoNextToggle">Otomatik sonraki örnek</label>
          <select id="autoNextToggle">
            <option value="on" selected>Açık</option>
            <option value="off">Kapalı</option>
          </select>
        </div>
        <div class="setting-box">
          <label for="autoNextDelay">Yeni örnek süresi (sn)</label>
          <select id="autoNextDelay">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4" selected>4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
          </select>
        </div>
      </div>

      <div class="panel question-card">
        <div id="questionText" class="question-text">Soru yükleniyor...</div>
      </div>

      <div id="choiceGrid" class="choice-grid"></div>
      <div id="resultText" class="result"></div>
    </section>
  </div>

const selectionCategories = document.getElementById('selectionCategories');
const screens = {
  home: document.getElementById('homeScreen'),
  select: document.getElementById('selectScreen'),
  game: document.getElementById('gameScreen')
};
const questionText = document.getElementById('questionText');
const choiceGrid = document.getElementById('choiceGrid');
const resultText = document.getElementById('resultText');
const selectedCountText = document.getElementById('selectedCountText');
const lifeText = document.getElementById('lifeText');
const correctText = document.getElementById('correctText');
const wrongText = document.getElementById('wrongText');
const autoNextToggle = document.getElementById('autoNextToggle');
const autoNextDelay = document.getElementById('autoNextDelay');

let selectedKeys = [];
let currentQuestion = null;
let selectedOption = null;
let lives = 5;
let correctCount = 0;
let wrongCount = 0;
let autoCheckTimer = null;
let autoNextTimer = null;

function showScreen(name){
  Object.values(screens).forEach(s=>s.classList.remove('active'));
  screens[name].classList.add('active');
}

function saveSelection(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(selectedKeys)); }
function loadSelection(){
  try{ selectedKeys = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch{ selectedKeys = []; }
}

function renderSelection(){
  selectionCategories.innerHTML = '';
  categories.forEach(cat => {
    const wrap = document.createElement('div');
    wrap.className = 'category';
    wrap.innerHTML = `<h3>${cat.title}</h3><small>${cat.desc}</small>`;
    const checks = document.createElement('div');
    checks.className = 'checks';
    conjunctionData.filter(x=>x.category===cat.id).forEach(item => {
      const div = document.createElement('div');
      div.className = 'check-item';
      const checked = selectedKeys.includes(item.key) ? 'checked' : '';
      div.innerHTML = `
        <input type="checkbox" id="chk_${item.key}" data-key="${item.key}" ${checked}>
        <label for="chk_${item.key}">${item.text} <span style="opacity:.9">(${item.tr})</span></label>
      `;
      checks.appendChild(div);
    });
    wrap.appendChild(checks);
    selectionCategories.appendChild(wrap);
  });

  selectionCategories.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', () => {
      const key = cb.dataset.key;
      if (cb.checked) {
        if (!selectedKeys.includes(key)) selectedKeys.push(key);
      } else {
        selectedKeys = selectedKeys.filter(x => x !== key);
      }
      updateSelectedCount();
    });
  });
  updateSelectedCount();
}


function updateSelectedCount(){ selectedCountText.textContent = `Seçilen: ${selectedKeys.length}`; }

function speak(text){
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE';
  u.rate = 0.9;
  window.speechSynthesis.speak(u);
}

function makeQuestion(){
  const pool = conjunctionData.filter(x => selectedKeys.includes(x.key));
  if (pool.length < 4) return null;
  const item = pool[Math.floor(Math.random()*pool.length)];
  const example = item.examples[Math.floor(Math.random()*item.examples.length)];
  const distractors = shuffle(pool.filter(x => x.key !== item.key)).slice(0,3);
  const options = shuffle([item, ...distractors]).map(x => ({ key:x.key, text:x.text }));
  return { item, example, options };
}

function shuffle(arr){
  const copy = [...arr];
  for (let i = copy.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [copy[i],copy[j]] = [copy[j],copy[i]];
  }
  return copy;
}

function clearTimers(){ clearTimeout(autoNextTimer); }

function renderPromptWithBlank(prompt){
  return escapeHtml(prompt).replace(/___/g, '<span class="blank-slot">___</span>');
}

function renderPromptWithAnswer(prompt, answer){
  const parts = answer.includes('...') ? answer.split('...').map(x => x.trim()) : [answer];
  let i = 0;
  return escapeHtml(prompt).replace(/___/g, () => {
    const part = parts[Math.min(i, parts.length - 1)];
    i += 1;
    return `<span class="filled-answer">${escapeHtml(part)}</span>`;
  });
}

function toPunktSpeech(prompt){
  return prompt.replace(/___/g, 'punkt punkt punkt');
}

function escapeHtml(str){
  return String(str)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;');
}

function loadQuestion(){
  clearTimers();
  selectedOption = null;
  lives = 5;
  lifeText.textContent = String(lives);
  resultText.textContent = '';
  currentQuestion = makeQuestion();
  if (!currentQuestion) {
    questionText.textContent = 'Oyuna başlamak için en az 4 bağlaç seçmelisin.';
    choiceGrid.innerHTML = '';
    return;
  }
  questionText.innerHTML = renderPromptWithBlank(currentQuestion.example.prompt);
  choiceGrid.innerHTML = '';
  currentQuestion.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt.text;
    btn.dataset.key = opt.key;
    btn.addEventListener('click', () => chooseOption(btn, opt));
    choiceGrid.appendChild(btn);
  });
  speak(toPunktSpeech(currentQuestion.example.prompt));
}

function chooseOption(btn, opt){
  if (!currentQuestion || btn.disabled) return;

  const isCorrect = opt.key === currentQuestion.item.key;
  if (isCorrect) {
    btn.classList.add('correct');
    correctCount++;
    correctText.textContent = String(correctCount);
    resultText.textContent = `Doğru: ${currentQuestion.item.text} (${currentQuestion.item.tr})`;
    questionText.innerHTML = renderPromptWithAnswer(currentQuestion.example.prompt, currentQuestion.item.text);
    choiceGrid.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    speak(currentQuestion.example.full);

    if (autoNextToggle.value === 'on') {
      autoNextTimer = setTimeout(loadQuestion, Number(autoNextDelay.value)*1000);
    }
  } else {
    btn.classList.add('wrong');
    btn.disabled = true;
    lives--;
    wrongCount++;
    lifeText.textContent = String(lives);
    wrongText.textContent = String(wrongCount);

    if (lives > 0) {
      resultText.textContent = `Yanlış. Kalan hak: ${lives}`;
    } else {
      const correctBtn = [...choiceGrid.querySelectorAll('.choice-btn')].find(b => b.dataset.key === currentQuestion.item.key);
      if (correctBtn) correctBtn.classList.add('correct');
      choiceGrid.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
      questionText.innerHTML = renderPromptWithAnswer(currentQuestion.example.prompt, currentQuestion.item.text);
      resultText.textContent = `Hak bitti. Doğru cevap: ${currentQuestion.item.text}`;
      speak(currentQuestion.example.full);

      if (autoNextToggle.value === 'on') {
        autoNextTimer = setTimeout(loadQuestion, Number(autoNextDelay.value)*1000);
      }
    }
  }
}

function openGame(){
  if (selectedKeys.length < 4) {
    alert('Oyuna başlamak için en az 4 bağlaç seç.');
    showScreen('select');
    return;
  }
  showScreen('game');
  updateSelectedCount();
  loadQuestion();
}

updateSelectedCount();
if (selectedKeys.length < 4) {
  selectedKeys = conjunctionData.slice(0, 8).map(x => x.key);
  saveSelection();
}
openGame();
